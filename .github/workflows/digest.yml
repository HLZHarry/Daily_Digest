name: Daily Digest

on:
  schedule:
    # 11:00 UTC = 7:00 AM ET (during EDT). Adjust to 12:00 UTC during EST.
    - cron: "0 11 * * *"
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write  # needed to commit the digest back to the repo

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: python -m src.main

      - name: Commit digest archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
